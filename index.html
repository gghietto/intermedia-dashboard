<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intermedia — Ops Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--surface:#0e1118;--surface2:#141822;--surface3:#1a2030;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --text:#dde2f0;--text2:#7c84a0;--text3:#3d4560;
  --accent:#3b82f6;--accent2:#6366f1;--accent3:#06b6d4;
  --ok:#10b981;--ok-bg:rgba(16,185,129,0.1);--ok-border:rgba(16,185,129,0.2);
  --warn:#f59e0b;--warn-bg:rgba(245,158,11,0.1);--warn-border:rgba(245,158,11,0.2);
  --crit:#ef4444;--crit-bg:rgba(239,68,68,0.1);--crit-border:rgba(239,68,68,0.2);
  --int:#475569;--int-bg:rgba(71,85,105,0.1);--int-border:rgba(71,85,105,0.2);
  --r:12px;--rsm:7px;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s}
.logo-wrap{padding:22px 18px 18px;border-bottom:1px solid var(--border)}
.logo{font-size:17px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#fff,#7c84a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:1px}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-group{font-family:var(--mono);font-size:9px;color:var(--text3);padding:14px 10px 5px;text-transform:uppercase;letter-spacing:1.2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rsm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .12s;margin-bottom:1px;position:relative;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(99,102,241,.1));color:var(--accent);border:1px solid rgba(59,130,246,.2)}
.nav-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--crit);color:#fff;font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:20px}
.sidebar-foot{padding:12px 8px;border-top:1px solid var(--border)}
.sync-btn{width:100%;padding:9px 14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--rsm);color:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.sync-btn:hover{opacity:.85}
.sync-btn.syncing .spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-meta{display:flex;justify-content:space-between;margin-top:6px;padding:0 2px}
.sync-meta span{font-family:var(--mono);font-size:10px;color:var(--text3)}
#sync-status{color:var(--ok)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--surface);flex-shrink:0}
.page-title{font-size:18px;font-weight:700;flex:1}
.time-filter-bar{display:flex;gap:3px;background:var(--bg);padding:3px;border-radius:var(--rsm);border:1px solid var(--border)}
.tf{padding:5px 11px;border-radius:5px;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--text3);transition:all .12s;white-space:nowrap}
.tf:hover{color:var(--text2)}
.tf.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.content{flex:1;overflow-y:auto;padding:22px 24px}

/* KPI GRID */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden;cursor:default;transition:border .15s}
.kpi:hover{border-color:var(--border2)}
.kpi-accent{position:absolute;top:0;left:0;right:0;height:2px}
.kpi-label{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.kpi-val{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.5px}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:5px}
.kpi-val.crit{color:var(--crit)}
.kpi-val.warn{color:var(--warn)}
.kpi-val.ok{color:var(--ok)}

/* SECTION */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.sec-sub{font-family:var(--mono);font-size:11px;color:var(--text3);font-weight:400}
.sec-action{font-family:var(--mono);font-size:11px;color:var(--accent);cursor:pointer;padding:5px 10px;border:1px solid rgba(59,130,246,.3);border-radius:var(--rsm);transition:all .12s}
.sec-action:hover{background:rgba(59,130,246,.1)}

/* CHARTS */
.chart-grid{display:grid;gap:14px;margin-bottom:24px}
.chart-grid-2{grid-template-columns:1fr 1fr}
.chart-grid-3{grid-template-columns:1fr 1fr 1fr}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.chart-card.wide{grid-column:1/-1}
.chart-label{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-wrap{position:relative}

/* TABLE */
.toolbar{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.search-inp{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 13px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;min-width:220px;transition:border .15s}
.search-inp:focus{border-color:var(--accent)}
.search-inp::placeholder{color:var(--text3)}
.sel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 11px;color:var(--text2);font-family:var(--mono);font-size:11px;outline:none;cursor:pointer;transition:border .15s}
.sel:focus{border-color:var(--accent)}
.count-tag{font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto}

.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap;font-weight:400}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015);cursor:pointer}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-family:var(--mono);font-size:10px;font-weight:500;white-space:nowrap}
.badge.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-border)}
.badge.warning{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}
.badge.critical{background:var(--crit-bg);color:var(--crit);border:1px solid var(--crit-border)}
.badge.internal{background:var(--int-bg);color:var(--int);border:1px solid var(--int-border)}
.badge.inactive{background:rgba(30,35,50,.5);color:var(--text3);border:1px solid var(--border)}
.badge.closed{background:rgba(30,35,50,.5);color:var(--text3);border:1px solid var(--border)}
.client-chip{font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:3px}

/* PROGRESS BAR */
.pbar{width:100px}
.pbar-track{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;border-radius:2px;transition:width .3s}
.pbar-fill.ok{background:var(--ok)}
.pbar-fill.warning{background:var(--warn)}
.pbar-fill.critical{background:var(--crit)}
.pbar-fill.none{background:var(--text3)}
.pbar-txt{font-family:var(--mono);font-size:10px;color:var(--text2);margin-top:3px}

/* PAGINATION */
.pag{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-top:4px}
.pag-info{font-family:var(--mono);font-size:11px;color:var(--text3)}
.pag-btns{display:flex;gap:3px}
.pag-btn{padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .12s}
.pag-btn:hover:not(:disabled){border-color:var(--border2);color:var(--text)}
.pag-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pag-btn:disabled{opacity:.3;cursor:not-allowed}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;backdrop-filter:blur(4px)}
.overlay.open{display:flex;align-items:flex-start;justify-content:flex-end}
.panel{width:580px;height:100vh;background:var(--surface);border-left:1px solid var(--border2);overflow-y:auto;animation:slideIn .18s ease}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}
.panel-head{padding:22px 26px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:5}
.panel-close{position:absolute;top:18px;right:22px;width:28px;height:28px;border:1px solid var(--border);border-radius:50%;background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .12s}
.panel-close:hover{border-color:var(--text);color:var(--text)}
.panel-client{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:3px}
.panel-title{font-size:20px;font-weight:700;padding-right:36px;margin-bottom:8px}
.panel-body{padding:22px 26px}
.panel-sec{margin-bottom:26px}
.panel-sec-title{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 14px}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.stat-val{font-size:20px;font-weight:700;letter-spacing:-.3px}
.stat-val.crit{color:var(--crit)}
.stat-val.warn{color:var(--warn)}
.stat-val.ok{color:var(--ok)}

/* EDIT FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 11px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border .12s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:60px}
.btn-primary{padding:9px 18px;background:var(--accent);border:none;border-radius:var(--rsm);color:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .12s}
.btn-primary:hover{opacity:.85}
.btn-primary.saved{background:var(--ok)}
.btn-ghost{padding:8px 14px;background:transparent;border:1px solid var(--border);border-radius:var(--rsm);color:var(--text2);font-family:var(--font);font-size:13px;cursor:pointer;transition:all .12s}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}

/* TASKS TABLE */
.tasks-tbl{width:100%;border-collapse:collapse}
.tasks-tbl th{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:5px 8px;border-bottom:1px solid var(--border);text-align:left;font-weight:400}
.tasks-tbl td{padding:7px 8px;font-size:12px;border-bottom:1px solid var(--border);font-family:var(--mono)}
.tasks-tbl tr:last-child td{border-bottom:none}

/* ALERTS */
.alert-list{display:flex;flex-direction:column;gap:7px}
.alert-item{display:flex;align-items:flex-start;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:9px 11px;transition:border .12s}
.alert-item.auto-a{border-left:2px solid var(--crit)}
.alert-item.manual-a{border-left:2px solid var(--warn)}
.alert-txt{flex:1;font-size:13px;line-height:1.4}
.alert-meta{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.alert-tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;flex-shrink:0;margin-top:1px}
.alert-tag.auto{background:var(--crit-bg);color:var(--crit)}
.alert-tag.manual{background:var(--warn-bg);color:var(--warn)}
.alert-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px;border-radius:3px;transition:color .12s;flex-shrink:0}
.alert-del:hover{color:var(--crit)}
.alert-add{display:flex;gap:8px;margin-top:9px}
.alert-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 11px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border .12s}
.alert-inp:focus{border-color:var(--warn)}
.btn-alert{padding:8px 13px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:var(--rsm);color:var(--warn);font-family:var(--font);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .12s}
.btn-alert:hover{background:rgba(245,158,11,.2)}

/* PEOPLE */
.people-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.person-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .15s;position:relative}
.person-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.person-card.needs-reminder{border-color:rgba(245,158,11,.3)}
.person-card.needs-reminder::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--warn);border-radius:var(--r) var(--r) 0 0}
.person-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin-bottom:10px;flex-shrink:0}
.person-name{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.person-email{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.person-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ps{background:var(--surface2);border-radius:var(--rsm);padding:8px 10px}
.ps-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.ps-val{font-size:15px;font-weight:700;letter-spacing:-.3px}
.ps-val.warn{color:var(--warn)}
.ps-val.ok{color:var(--ok)}
.reminder-badge{display:inline-flex;align-items:center;gap:4px;background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border);border-radius:20px;font-family:var(--mono);font-size:10px;padding:2px 8px;margin-top:8px}

/* PEOPLE FILTER */
.people-controls{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.days-filter{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:6px 12px}
.days-filter label{font-family:var(--mono);font-size:11px;color:var(--text3)}
.days-filter input{width:50px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 7px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;text-align:center}

/* ALERTS PAGE */
.alerts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.alert-proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:border .15s}
.alert-proj-card:hover{border-color:var(--border2)}
.alert-proj-name{font-size:14px;font-weight:600;margin-bottom:2px}
.alert-proj-client{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:10px}

/* REPORTS */
.reports-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .15s;text-align:center}
.report-card:hover{border-color:var(--accent);background:rgba(59,130,246,.04)}
.report-icon{font-size:28px;margin-bottom:10px}
.report-name{font-size:14px;font-weight:600;margin-bottom:4px}
.report-desc{font-size:12px;color:var(--text3);line-height:1.4}

/* REPORT PREVIEW */
.report-preview{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-top:16px}
.report-preview-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.report-preview-title{font-size:16px;font-weight:700}
.report-actions{display:flex;gap:8px}

/* CONFIG */
.config-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:16px}
.config-title{font-size:15px;font-weight:700;margin-bottom:18px}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rsm);padding:11px 16px;font-size:13px;z-index:9999;transform:translateY(50px);opacity:0;transition:all .22s;pointer-events:none;max-width:320px}
.toast.show{transform:none;opacity:1}
.toast.success{border-left:3px solid var(--ok)}
.toast.error{border-left:3px solid var(--crit)}
.toast.info{border-left:3px solid var(--accent)}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
.loading-txt{font-family:var(--mono);font-size:12px;color:var(--text3)}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.4}
.empty-txt{font-size:14px}

/* PERSON DETAIL IN PANEL */
.week-bars{display:flex;gap:3px;align-items:flex-end;height:60px;margin-top:8px}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.week-bar{width:100%;border-radius:2px 2px 0 0;transition:height .3s;min-height:2px}
.week-bar-label{font-family:var(--mono);font-size:8px;color:var(--text3);transform:rotate(-45deg);white-space:nowrap}

/* RESPONSIVE */
@media(max-width:1300px){.kpi-row{grid-template-columns:repeat(3,1fr)}.people-grid{grid-template-columns:1fr 1fr}}
@media(max-width:900px){.sidebar{width:56px}.logo-wrap .logo-sub,.nav-item span,.nav-group,.sync-btn span,.sync-meta{display:none}.nav-item{justify-content:center}.sync-btn{padding:10px}.chart-grid-2,.chart-grid-3{grid-template-columns:1fr}.alerts-grid,.reports-grid,.people-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo-wrap">
      <div class="logo">intermedia</div>
      <div class="logo-sub">OPS DASHBOARD</div>
    </div>
    <nav class="nav">
      <div class="nav-group">Overview</div>
      <div class="nav-item active" onclick="nav('dashboard')">
        <span class="nav-icon">◈</span><span>Dashboard</span>
      </div>
      <div class="nav-group">Projects</div>
      <div class="nav-item" onclick="nav('projects')">

<script>
// ═══════════════════════════════════════════════════════
// CONFIG — reemplazar con tu URL
// ═══════════════════════════════════════════════════════
const API = 'https://script.google.com/a/macros/intermediait.com/s/AKfycbwihY4nGSLfMPZhftXntXatoiMbcVfKoxoNDQJyQEAV1mOnmHL2pNG0pUhNI9whWSLWeA/exec';

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let STATE = {
  page: 'dashboard',
  filter: 'month',
  projects: [],
  people: [],
  alerts: {},       // projectId -> [{id,text,date}]
  appConfig: { dias_sin_cargar: 5 },
  projConfig: {},   // projectId -> {budget_manual,start_date,...}
  projPage: 1,
  projSearch: '',
  projStatus: 'all',
  projBillable: 'all',
  peopleMaxDays: 9999,
  activeReport: null,
  charts: {},
};
const PER_PAGE = 15;

// Load from localStorage
try {
  const lsAlerts = localStorage.getItem('im_alerts');
  if (lsAlerts) STATE.alerts = JSON.parse(lsAlerts);
  const lsCfg = localStorage.getItem('im_proj_config');
  if (lsCfg) STATE.projConfig = JSON.parse(lsCfg);
  const lsApp = localStorage.getItem('im_app_config');
  if (lsApp) STATE.appConfig = JSON.parse(lsApp);
} catch(e){}

const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} };

// ═══════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════
async function apiFetch(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  try {
    const r = await fetch(`${API}?${qs}`, { mode: 'no-cors' });
    return { ok: true };
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

async function apiGet(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  try {
    const r = await fetch(`${API}?${qs}`);
    return await r.json();
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

async function loadData() {
  const [projRes, peopleRes, alertsRes, cfgRes] = await Promise.all([
    apiGet('getProjects'),
    apiGet('getPeople'),
    apiGet('getAlerts'),
    apiGet('getAppConfig'),
  ]);
  if (projRes.ok)   STATE.projects   = projRes.data || [];
  if (peopleRes.ok) { STATE.people = peopleRes.data || []; STATE.appConfig.dias_sin_cargar = peopleRes.dias_config || 5; }
  if (alertsRes.ok) { STATE.alerts = alertsRes.data || {}; save('im_alerts', STATE.alerts); }
  if (cfgRes.ok)    STATE.appConfig = { ...STATE.appConfig, ...cfgRes.data };
  updateAlertBadge();
  render();
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const fmt   = n => n == null || n === '' ? '—' : Number(n).toLocaleString('es-AR', {maximumFractionDigits:1});
const fmtH  = n => n == null || n === '' ? '—' : `${fmt(n)}h`;
const fmtPct= n => n == null || n === '' ? '—' : `${Number(n).toFixed(1)}%`;
const fmtDate = d => {
  if (!d) return '—';
  try {
    const s = d instanceof Date ? d : new Date(d);
    if (isNaN(s)) return '—';
    return s.toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'});
  } catch(e) { return '—'; }
};
const daysAgo = d => {
  if (!d) return null;
  try { return Math.round((new Date() - new Date(d)) / 86400000); } catch(e) { return null; }
};
const statusLabel = s => ({critical:'⛔ Crítico',warning:'⚠️ Riesgo',ok:'● En curso',internal:'○ Interno',inactive:'— Inactivo',closed:'✓ Cerrado'})[s] || s;
const initials = name => name.split(' ').filter(Boolean).slice(0,2).map(n=>n[0]).join('').toUpperCase();
const avatarColor = email => {
  const colors = ['#3b82f6','#6366f1','#8b5cf6','#ec4899','#ef4444','#f59e0b','#10b981','#06b6d4','#14b8a6'];
  let h = 0; for(const c of email) h = (h*31+c.charCodeAt(0))%colors.length;
  return colors[h];
};

function autoAlerts(p) {
  const a = [];
  const pct = Number(p.pct_consumed);
  const cfg = STATE.projConfig[p.project_id] || {};
  const endDate = cfg.end_date || p.end_date;
  if (pct > 100) a.push(`⛔ Pasado de budget (${pct.toFixed(0)}%)`);
  else if (pct >= 85) a.push(`⚠️ Cerca del budget (${pct.toFixed(0)}%)`);
  if (endDate) {
    const d = daysAgo(endDate);
    if (d > 0) a.push(`📅 Fecha fin vencida (hace ${d}d)`);
    else if (d !== null && d >= -30) a.push(`📅 Vence en ${Math.abs(d)}d`);
  }
  return a;
}

function manualAlerts(pid) { return STATE.alerts[String(pid)] || []; }
function allAlerts(p) { return { auto: autoAlerts(p), manual: manualAlerts(p.project_id) }; }

function updateAlertBadge() {
  let total = 0;
  STATE.projects.forEach(p => {
    const {auto, manual} = allAlerts(p);
    total += auto.length + manual.length;
  });
  document.getElementById('alert-badge').textContent = total;
}

function filterByTime(data, dateField) {
  const now = new Date();
  const ranges = {
    day:     d => d >= new Date(now.getFullYear(),now.getMonth(),now.getDate()),
    week:    d => { const mon=new Date(now); mon.setDate(now.getDate()-(now.getDay()||7)+1); mon.setHours(0,0,0,0); return d>=mon; },
    month:   d => d >= new Date(now.getFullYear(),now.getMonth(),1),
    quarter: d => { const q=Math.floor(now.getMonth()/3); return d >= new Date(now.getFullYear(),q*3,1); },
    half:    d => { const h=new Date(now); h.setMonth(h.getMonth()-6); return d>=h; },
    year:    d => d >= new Date(now.getFullYear(),0,1),
    all:     () => true,
  };
  const fn = ranges[STATE.filter] || (() => true);
  return data.filter(item => {
    const v = item[dateField];
    if (!v) return STATE.filter === 'all';
    try { return fn(new Date(v)); } catch(e) { return false; }
  });
}

// Destroy all charts before re-render
function destroyCharts() {
  Object.values(STATE.charts).forEach(c => { try { c.destroy(); } catch(e){} });
  STATE.charts = {};
}

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════
function nav(page) {
  STATE.page = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const idx = {dashboard:0,projects:1,alerts:2,people:3,reports:4,config:5};
  document.querySelectorAll('.nav-item')[idx[page]]?.classList.add('active');
  const titles = {dashboard:'Dashboard',projects:'Proyectos',alerts:'Alertas',people:'Personas',reports:'Reportes',config:'Configuración'};
  document.getElementById('page-title').textContent = titles[page] || page;
  render();
}

function setFilter(f, el) {
  STATE.filter = f;
  document.querySelectorAll('.tf').forEach(e => e.classList.remove('active'));
  el?.classList.add('active');
  render();
}

function render() {
  destroyCharts();
  const el = document.getElementById('content');
  if (!STATE.projects.length && !STATE.people.length) {
    el.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-txt">Cargando datos desde la API...</div></div>`;
    return;
  }
  if (STATE.page === 'dashboard') renderDashboard();
  else if (STATE.page === 'projects') renderProjects();
  else if (STATE.page === 'alerts') renderAlerts();
  else if (STATE.page === 'people') renderPeople();
  else if (STATE.page === 'reports') renderReports();
  else if (STATE.page === 'config') renderConfig();
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
function renderDashboard() {
  const el = document.getElementById('content');
  const billable = STATE.projects.filter(p => p.billable === 'Sí');
  const crits = STATE.projects.filter(p => p.status === 'critical');
  const warns = STATE.projects.filter(p => p.status === 'warning');
  const totalHrs = billable.reduce((s,p) => s + (Number(p.total_hours)||0), 0);
  const sinBudget = billable.filter(p => !p.budget_efectivo || p.budget_efectivo == 0).length;
  const internals = STATE.projects.filter(p => p.billable === 'No');
  const totalHrsAll = STATE.projects.reduce((s,p) => s + (Number(p.total_hours)||0), 0);

  el.innerHTML = `
  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-accent" style="background:linear-gradient(90deg,var(--accent),var(--accent2))"></div>
      <div class="kpi-label">Proyectos Billeables</div>
      <div class="kpi-val">${billable.length}</div>
      <div class="kpi-sub">${STATE.projects.length} total incl. internos</div>
    </div>
    <div class="kpi">
      <div class="kpi-accent" style="background:var(--crit)"></div>
      <div class="kpi-label">Críticos</div>
      <div class="kpi-val crit">${crits.length}</div>
      <div class="kpi-sub">Requieren acción</div>
    </div>
    <div class="kpi">
      <div class="kpi-accent" style="background:var(--warn)"></div>
      <div class="kpi-label">En Riesgo</div>
      <div class="kpi-val warn">${warns.length}</div>
      <div class="kpi-sub">Monitorear</div>
    </div>
    <div class="kpi">
      <div class="kpi-accent" style="background:var(--ok)"></div>
      <div class="kpi-label">Horas Billeables</div>
      <div class="kpi-val ok">${fmt(totalHrs)}</div>
      <div class="kpi-sub">Total acumulado</div>
    </div>
    <div class="kpi">
      <div class="kpi-accent" style="background:var(--accent3)"></div>
      <div class="kpi-label">Total Horas</div>
      <div class="kpi-val">${fmt(totalHrsAll)}</div>
      <div class="kpi-sub">${internals.length} proyectos internos</div>
    </div>
  </div>

  <div class="sec-head"><div class="sec-title">Distribución <span class="sec-sub">Portfolio general</span></div></div>
  <div class="chart-grid chart-grid-3" style="margin-bottom:24px">
    <div class="chart-card">
      <div class="chart-label">Estado del Portfolio</div>
      <div class="chart-wrap" style="height:180px"><canvas id="ch-estado"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-label">Billeable vs No Billeable</div>
      <div class="chart-wrap" style="height:180px"><canvas id="ch-bill"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-label">Horas por Cliente (top 8)</div>
      <div class="chart-wrap" style="height:180px"><canvas id="ch-clients"></canvas></div>
    </div>
  </div>

  <div class="sec-head"><div class="sec-title">Proyectos <span class="sec-sub">Todos los proyectos</span></div></div>
  <div class="chart-grid" style="margin-bottom:24px">
    <div class="chart-card wide">
      <div class="chart-label">Horas cargadas por proyecto</div>
      <div class="chart-wrap" style="height:${Math.max(280, STATE.projects.length * 20)}px"><canvas id="ch-proj"></canvas></div>
    </div>
  </div>

  <div class="chart-grid chart-grid-2" style="margin-bottom:24px">
    <div class="chart-card wide">
      <div class="chart-label">Budget vs Horas cargadas (proyectos con budget)</div>
      <div class="chart-wrap" style="height:${Math.max(240, STATE.projects.filter(p=>p.budget_efectivo>0).length * 24)}px"><canvas id="ch-budget"></canvas></div>
    </div>
  </div>

  <div class="chart-grid" style="margin-bottom:24px">
    <div class="chart-card wide">
      <div class="chart-label">% del budget consumido por proyecto</div>
      <div class="chart-wrap" style="height:${Math.max(240, STATE.projects.filter(p=>p.budget_efectivo>0).length * 24)}px"><canvas id="ch-pct"></canvas></div>
    </div>
  </div>`;

  requestAnimationFrame(() => initDashboardCharts());
}

function initDashboardCharts() {
  const chartOpts = (extra={}) => ({
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#7c84a0', font: { family: 'JetBrains Mono', size: 11 }, boxWidth: 12, padding: 14 } } },
    ...extra
  });
  const axisStyle = { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#7c84a0', font: { family: 'JetBrains Mono', size: 10 } } };

  // Estado
  const sc = { critical:0, warning:0, ok:0, internal:0, inactive:0 };
  STATE.projects.forEach(p => sc[p.status] = (sc[p.status]||0) + 1);
  mkDoughnut('ch-estado',
    ['Crítico','Riesgo','En curso','Interno','Inactivo'],
    [sc.critical||0, sc.warning||0, sc.ok||0, sc.internal||0, sc.inactive||0],
    ['#ef4444','#f59e0b','#10b981','#475569','#1e2535']
  );

  // Billeable
  const bh = STATE.projects.filter(p=>p.billable==='Sí').reduce((s,p)=>s+(Number(p.total_hours)||0),0);
  const nh = STATE.projects.filter(p=>p.billable!=='Sí').reduce((s,p)=>s+(Number(p.total_hours)||0),0);
  mkDoughnut('ch-bill',['Billeable','No Billeable'],[Math.round(bh),Math.round(nh)],['#3b82f6','#1e2535']);

  // Clientes
  const cm = {};
  STATE.projects.forEach(p => { cm[p.client_name] = (cm[p.client_name]||0) + (Number(p.total_hours)||0); });
  const ct = Object.entries(cm).sort((a,b)=>b[1]-a[1]).slice(0,8);
  mkBarH('ch-clients', ct.map(c=>c[0]), ct.map(c=>Math.round(c[1])), '#3b82f6');

  // Todos los proyectos
  const ps = [...STATE.projects].sort((a,b)=>(Number(b.total_hours)||0)-(Number(a.total_hours)||0));
  const pColors = ps.map(p=>({critical:'#ef4444',warning:'#f59e0b',ok:'#3b82f6',internal:'#475569',inactive:'#1e2535'})[p.status]||'#3b82f6');
  mkBarH('ch-proj', ps.map(p=>p.project_name.trim().substring(0,30)), ps.map(p=>Number(p.total_hours)||0), pColors);

  // Budget vs Horas
  const wb = STATE.projects.filter(p=>p.budget_efectivo>0).sort((a,b)=>(Number(b.total_hours)||0)-(Number(a.total_hours)||0));
  if (wb.length) {
    const ctx = document.getElementById('ch-budget')?.getContext('2d');
    if (ctx) {
      STATE.charts['ch-budget'] = new Chart(ctx, {
        type:'bar',
        data:{ labels: wb.map(p=>p.project_name.trim().substring(0,28)),
          datasets:[
            {label:'Budget',data:wb.map(p=>Number(p.budget_efectivo)||0),backgroundColor:'rgba(59,130,246,0.2)',borderColor:'#3b82f6',borderWidth:1},
            {label:'Horas',data:wb.map(p=>Number(p.total_hours)||0),backgroundColor:wb.map(p=>p.status==='critical'?'rgba(239,68,68,0.7)':'rgba(59,130,246,0.7)'),borderWidth:0}
          ]},
        options:{...chartOpts(),indexAxis:'y',plugins:{legend:{labels:{color:'#7c84a0',font:{family:'JetBrains Mono',size:11}}}},scales:{x:axisStyle,y:axisStyle}}
      });
    }
  }

  // % consumido
  if (wb.length) {
    const ctx2 = document.getElementById('ch-pct')?.getContext('2d');
    if (ctx2) {
      const pctColors = wb.map(p=>{ const v=Number(p.pct_consumed)||0; return v>100?'rgba(239,68,68,0.7)':v>=85?'rgba(245,158,11,0.7)':'rgba(16,185,129,0.7)'; });
      STATE.charts['ch-pct'] = new Chart(ctx2, {
        type:'bar',
        data:{ labels:wb.map(p=>p.project_name.trim().substring(0,28)),
          datasets:[{label:'% Consumido',data:wb.map(p=>Number(p.pct_consumed)||0),backgroundColor:pctColors,borderWidth:0}]},
        options:{...chartOpts(),indexAxis:'y',plugins:{legend:{display:false}},scales:{x:axisStyle,y:axisStyle}}
      });
    }
  }
}

function mkDoughnut(id, labels, data, colors) {
  const ctx = document.getElementById(id)?.getContext('2d');
  if (!ctx) return;
  STATE.charts[id] = new Chart(ctx, {
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'right',labels:{color:'#7c84a0',font:{family:'JetBrains Mono',size:11},boxWidth:12,padding:10}}}}
  });
}

function mkBarH(id, labels, data, colors) {
  const ctx = document.getElementById(id)?.getContext('2d');
  if (!ctx) return;
  const ca = Array.isArray(colors) ? colors : Array(labels.length).fill(colors);
  STATE.charts[id] = new Chart(ctx, {
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:ca,borderWidth:0}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#7c84a0',font:{family:'JetBrains Mono',size:10}}},
              y:{grid:{color:'rgba(255,255,255,0.02)'},ticks:{color:'#7c84a0',font:{family:'JetBrains Mono',size:10}}}}}
  });
}

// ═══════════════════════════════════════════════════════
// PROJECTS
// ═══════════════════════════════════════════════════════
function renderProjects() {
  const filtered = STATE.projects.filter(p => {
    if (STATE.projStatus !== 'all' && p.status !== STATE.projStatus) return false;
    if (STATE.projBillable === 'billable' && p.billable !== 'Sí') return false;
    if (STATE.projBillable === 'nonbillable' && p.billable === 'Sí') return false;
    if (STATE.projSearch) {
      const q = STATE.projSearch.toLowerCase();
      if (!p.project_name.toLowerCase().includes(q) && !p.client_name.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (STATE.projPage > pages) STATE.projPage = 1;
  const start = (STATE.projPage - 1) * PER_PAGE;
  const paged = filtered.slice(start, start + PER_PAGE);

  const rows = paged.map(p => {
    const {auto, manual} = allAlerts(p);
    const alertCount = auto.length + manual.length;
    const pct = p.pct_consumed !== '' ? Number(p.pct_consumed) : null;
    const cfg = STATE.projConfig[p.project_id] || {};
    const budget = cfg.budget_manual || p.budget_efectivo;
    return `
    <tr onclick="openProject(${p.project_id})">
      <td><span class="client-chip">${p.client_name}</span></td>
      <td style="font-weight:500;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.project_name.trim()}</td>
      <td><span class="badge ${p.status}">${statusLabel(p.status)}</span></td>
      <td style="font-family:var(--mono);font-size:12px">${budget ? fmtH(budget) : '<span style="color:var(--text3)">—</span>'}</td>
      <td style="font-family:var(--mono);font-size:12px">${fmtH(p.total_hours)}</td>
      <td>${pct !== null ? `
        <div class="pbar">
          <div class="pbar-track"><div class="pbar-fill ${p.status}" style="width:${Math.min(pct,100)}%"></div></div>
          <div class="pbar-txt">${fmtPct(pct)}</div>
        </div>` : '<span style="color:var(--text3);font-family:var(--mono);font-size:11px">Sin budget</span>'}
      </td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--text2)">${p.pm || '—'}</td>
      <td>${alertCount > 0 ? `<span style="background:var(--crit-bg);color:var(--crit);font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--crit-border)">${alertCount}</span>` : '<span style="color:var(--text3);font-size:11px">—</span>'}</td>
    </tr>`;
  }).join('');

  const pagBtns = Array.from({length:pages},(_,i)=>`<button class="pag-btn ${i+1===STATE.projPage?'active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join('');

  document.getElementById('content').innerHTML = `
  <div class="toolbar">

function closePanel(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function saveConfig(id) {
  const cfg = {
    budget_manual: document.getElementById('f-budget').value ? Number(document.getElementById('f-budget').value) : null,
    pm:            document.getElementById('f-pm').value,
    start_date:    document.getElementById('f-start').value,
    end_date:      document.getElementById('f-end').value,
    avance_real:   document.getElementById('f-avance').value,
    comentarios:   document.getElementById('f-comentarios').value,
  };
  STATE.projConfig[id] = cfg;
  save('im_proj_config', STATE.projConfig);
  const btn = document.getElementById('save-cfg-btn');
  btn.textContent = '✓ Guardado'; btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Guardar cambios'; btn.classList.remove('saved'); }, 2000);
  toast('Configuración guardada localmente', 'success');
  updateAlertBadge();
}

async function syncConfigToServer(id) {
  const cfg = STATE.projConfig[id] || {};
  const payload = { project_id: id, ...cfg };
  const res = await apiGet('saveConfig', { payload: JSON.stringify(payload) });
  if (res.ok) toast('Sincronizado con Google Sheets ✓', 'success');
  else toast('Error al sincronizar: ' + (res.message || res.error), 'error');
}

// ALERTS
// ═══════════════════════════════════════════════════════
function addAlert(pid) {
  const inp = document.getElementById(`ai-${pid}`);
  const text = inp.value.trim();
  if (!text) return;
  const id = Date.now().toString();
  const date = new Date().toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'});
  if (!STATE.alerts[pid]) STATE.alerts[pid] = [];
  STATE.alerts[pid].push({ id, text, date });
  save('im_alerts', STATE.alerts);
  inp.value = '';
  const list = document.getElementById(`al-${pid}`) || document.getElementById(`alp-${pid}`);
  if (list) {
    const el = document.createElement('div');
    el.className = 'alert-item manual-a'; el.id = `ali-${id}`;
    el.innerHTML = `<div style="flex:1"><div class="alert-txt">${text}</div><div class="alert-meta">Manual · ${date}</div></div><span class="alert-tag manual">MANUAL</span><button class="alert-del" onclick="delAlert(${pid},'${id}')" title="Eliminar">✕</button>`;
    list.appendChild(el);
    list.querySelector('[style*="Sin alertas"]')?.remove();
  }
  // Sync to server
  apiGet('saveAlerts', { payload: JSON.stringify({ projectId: pid, alerts: STATE.alerts[pid] }) });
  updateAlertBadge();
  toast('Alerta agregada', 'success');
}

function delAlert(pid, aid) {
  if (!STATE.alerts[pid]) return;
  STATE.alerts[pid] = STATE.alerts[pid].filter(a => a.id !== aid);
  save('im_alerts', STATE.alerts);
  const el = document.getElementById(`ali-${aid}`);
  if (el) { el.style.opacity='0'; el.style.transition='opacity .2s'; setTimeout(()=>el.remove(),200); }
  apiGet('saveAlerts', { payload: JSON.stringify({ projectId: pid, alerts: STATE.alerts[pid] }) });
  updateAlertBadge();
  toast('Alerta eliminada', 'success');
}

function renderAlerts() {
  const withAlerts = STATE.projects.filter(p => {
    const {auto, manual} = allAlerts(p);
    return auto.length + manual.length > 0;
  });

  if (!withAlerts.length) {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">✓</div><div class="empty-txt">Sin alertas activas</div></div>`;
    return;
  }

  // Sort: critical first
  withAlerts.sort((a,b) => {
    const order = {critical:0,warning:1,ok:2,internal:3,inactive:4,closed:5};
    return (order[a.status]||9) - (order[b.status]||9);
  });

  const cards = withAlerts.map(p => {
    const {auto, manual} = allAlerts(p);
    return `
    <div class="alert-proj-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div class="alert-proj-client">${p.client_name}</div>
          <div class="alert-proj-name">${p.project_name.trim()}</div>
        </div>
        <span class="badge ${p.status}">${statusLabel(p.status)}</span>
      </div>
      <div class="alert-list" id="alp-${p.project_id}">
        ${auto.map(a=>`<div class="alert-item auto-a"><div class="alert-txt" style="font-size:12px">${a}</div><span class="alert-tag auto">AUTO</span></div>`).join('')}
        ${manual.map(a=>`
        <div class="alert-item manual-a" id="ali-${a.id}">
          <div style="flex:1"><div class="alert-txt" style="font-size:12px">${a.text}</div><div class="alert-meta">${a.date}</div></div>
          <span class="alert-tag manual">MANUAL</span>
          <button class="alert-del" onclick="delAlert(${p.project_id},'${a.id}')" title="Eliminar">✕</button>
        </div>`).join('')}
      </div>
      <div class="alert-add" style="margin-top:8px">
        <input class="alert-inp" id="ai-${p.project_id}" placeholder="Agregar alerta…" onkeydown="if(event.key==='Enter')addAlert(${p.project_id})">
        <button class="btn-alert" onclick="addAlert(${p.project_id})">+</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
  <div class="sec-head">
    <div class="sec-title">Alertas Activas <span class="sec-sub">${withAlerts.length} proyectos</span></div>
    <button class="btn-ghost" onclick="sendSlackReminders()" style="font-size:12px">🔔 Enviar recordatorios Slack</button>
  </div>
  <div class="alerts-grid">${cards}</div>`;
}

function renderPeople() {
  const maxDays = STATE.peopleMaxDays;
  const dias = STATE.appConfig.dias_sin_cargar || 5;

  let people = [...STATE.people];
  if (maxDays < 9999) people = people.filter(p => p.days_since <= maxDays);

  // Sort: needs reminder first, then by days_since desc
  people.sort((a,b) => {
    if (a.needs_reminder !== b.needs_reminder) return a.needs_reminder ? -1 : 1;
    return b.days_since - a.days_since;
  });

  const reminders = people.filter(p => p.needs_reminder);

  const cards = people.map(p => {
    const color = avatarColor(p.email);
    const ini = initials(p.name);
    const billPct = p.pct_billable || 0;
    return `
    <div class="person-card ${p.needs_reminder?'needs-reminder':''}" onclick="openPerson('${p.email}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="person-avatar" style="background:${color}">${ini}</div>
        <div style="min-width:0">
          <div class="person-name">${p.name}</div>
          <div class="person-email">${p.email}</div>
        </div>
      </div>
      ${p.needs_reminder ? `<div class="reminder-badge">⚠️ ${p.days_since}d sin cargar</div>` : ''}
      <div class="person-stats" style="margin-top:${p.needs_reminder?'8':'0'}px">
        <div class="ps"><div class="ps-label">Total Horas</div><div class="ps-val">${fmt(p.total_hours)}h</div></div>
        <div class="ps"><div class="ps-label">Billeables</div><div class="ps-val ${billPct>50?'ok':''}">${fmt(p.billable_hours)}h</div></div>
        <div class="ps"><div class="ps-label">% Billeable</div><div class="ps-val ${billPct>50?'ok':'warn'}">${billPct.toFixed(0)}%</div></div>
        <div class="ps"><div class="ps-label">Última carga</div><div class="ps-val ${p.needs_reminder?'warn':''}" style="font-size:13px">${p.days_since === 0 ? 'Hoy' : p.days_since < 0 ? 'Futuro' : `${p.days_since}d`}</div></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
  <div class="people-controls">
    <div class="days-filter">
      <label>Mostrar activos en últimos</label>
      <input type="number" value="${maxDays === 9999 ? '' : maxDays}" placeholder="∞" min="1"
        onchange="STATE.peopleMaxDays=this.value?Number(this.value):9999;renderPeople()">
      <label>días</label>
    </div>
    <div class="days-filter">
      <label>Alerta sin cargar después de</label>
      <input type="number" value="${dias}" min="1" max="30"
        onchange="updateDiasSinCargar(Number(this.value))">
      <label>días</label>
    </div>
    <span class="count-tag">${people.length} personas · ${reminders.length} con alerta</span>
    ${reminders.length > 0 ? `<button class="sec-action" onclick="sendSlackReminders()">🔔 Enviar recordatorios Slack (${reminders.length})</button>` : ''}
  </div>
  ${reminders.length > 0 ? `
  <div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:13px;display:flex;align-items:center;gap:10px">
    <span style="font-size:16px">⚠️</span>
    <span><strong>${reminders.length} personas</strong> llevan más de ${dias} días sin cargar horas.</span>
  </div>` : ''}
  <div class="people-grid">${cards || '<div class="empty"><div class="empty-icon">👥</div><div class="empty-txt">Sin personas para mostrar</div></div>'}</div>`;
}

async function updateDiasSinCargar(dias) {
  STATE.appConfig.dias_sin_cargar = dias;
  STATE.people.forEach(p => { p.needs_reminder = p.days_since >= dias; });
  save('im_app_config', STATE.appConfig);
  // Sync to server
  await apiGet('saveAppConfig', { payload: JSON.stringify({ dias_sin_cargar: dias }) });
  renderPeople();
  toast(`Configuración actualizada: ${dias} días`, 'success');
}

function openPerson(email) {
  const p = STATE.people.find(x => x.email === email);
  if (!p) return;
  const color = avatarColor(email);
  const ini = initials(p.name);

  // Build weekly chart data (last 12 weeks)
  const weeks = Object.entries(p.entries_by_week || {})
    .sort((a,b) => a[0].localeCompare(b[0]))
    .slice(-12);
  const maxH = Math.max(...weeks.map(w=>w[1]), 1);

  const bars = weeks.map(([w, h]) => {
    const pct = Math.round((h / maxH) * 100);
    const weekLabel = w.replace(/\d{4}-/, '');
    return `<div class="week-bar-wrap">
      <div style="font-family:var(--mono);font-size:9px;color:var(--text3);text-align:center;margin-bottom:2px">${Math.round(h)}h</div>
      <div class="week-bar" style="height:${Math.max(pct,3)}%;background:var(--accent);opacity:.8;border-radius:2px 2px 0 0;width:100%"></div>
    </div>`;
  }).join('');

  const projRows = Object.entries(p.projects || {})
    .sort((a,b) => b[1]-a[1])
    .map(([name, h]) => `
    <tr>
      <td>${name}</td>
      <td style="text-align:right">${fmt(h)}h</td>
      <td style="text-align:right">${p.total_hours > 0 ? (h/p.total_hours*100).toFixed(1)+'%' : '—'}</td>
    </tr>`).join('');

  document.getElementById('panel-client').textContent = p.email;
  document.getElementById('panel-title').innerHTML = `<div style="display:flex;align-items:center;gap:10px"><div class="person-avatar" style="background:${color};width:36px;height:36px;font-size:13px">${ini}</div>${p.name}</div>`;
  document.getElementById('panel-badge').innerHTML = p.needs_reminder
    ? `<span class="badge warning">⚠️ ${p.days_since}d sin cargar</span>`
    : `<span class="badge ok">● Activo</span>`;

  document.getElementById('panel-body').innerHTML = `
  <div class="panel-sec">
    <div class="panel-sec-title">Resumen General</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">Total Horas</div><div class="stat-val">${fmt(p.total_hours)}h</div></div>
      <div class="stat-box"><div class="stat-label">Horas Billeables</div><div class="stat-val ok">${fmt(p.billable_hours)}h</div></div>
      <div class="stat-box"><div class="stat-label">% Billeable</div><div class="stat-val ${p.pct_billable>50?'ok':'warn'}">${p.pct_billable.toFixed(1)}%</div></div>
      <div class="stat-box"><div class="stat-label">Última carga</div><div class="stat-val ${p.needs_reminder?'warn':''}" style="font-size:16px">${fmtDate(p.last_entry)}</div></div>
    </div>
  </div>

  <div class="panel-sec">
    <div class="panel-sec-title">Actividad — Últimas 12 semanas</div>
    <div style="display:flex;gap:4px;align-items:flex-end;height:80px;padding:0 4px">
      ${bars || '<div style="color:var(--text3);font-size:12px">Sin datos</div>'}
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:6px;font-family:var(--mono);font-size:9px;color:var(--text3)">
      <span>${weeks[0]?.[0]?.replace(/\d{4}-/,'') || ''}</span>
      <span>${weeks[weeks.length-1]?.[0]?.replace(/\d{4}-/,'') || ''}</span>
    </div>
  </div>

  <div class="panel-sec">
    <div class="panel-sec-title">Horas por Proyecto</div>
    <table class="tasks-tbl">
      <thead><tr><th>Proyecto</th><th style="text-align:right">Horas</th><th style="text-align:right">% del Total</th></tr></thead>
      <tbody>${projRows || '<tr><td colspan="3" style="color:var(--text3)">Sin datos</td></tr>'}</tbody>
    </table>
  </div>`;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

  document.getElementById('content').innerHTML = `
  <div class="sec-head"><div class="sec-title">Generar Reporte</div></div>
  <div class="reports-grid">${cards}</div>
  ${STATE.activeReport ? `
  <div class="report-preview" id="report-preview">
    <div class="report-preview-head">
      <div class="report-preview-title">${reportTypes.find(r=>r.id===STATE.activeReport)?.name || 'Reporte'}</div>
      <div class="report-actions">
        <button class="btn-ghost" onclick="copyReport()">📋 Copiar</button>
        <button class="btn-primary" onclick="emailReport()">✉️ Enviar por email</button>
      </div>
    </div>
    <div id="report-content" style="font-family:var(--mono);font-size:12px;line-height:1.8;color:var(--text2)">${previewHTML}</div>
  </div>` : ''}`;
}

function generateReport(type) {
  STATE.activeReport = type;
  renderReports();
  setTimeout(() => document.getElementById('report-preview')?.scrollIntoView({behavior:'smooth'}), 100);
}

function buildReportPreview(type) {
  const now = new Date().toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const billable = STATE.projects.filter(p => p.billable === 'Sí');
  const crits = STATE.projects.filter(p => p.status === 'critical');
  const warns = STATE.projects.filter(p => p.status === 'warning');
  const totalHrs = billable.reduce((s,p) => s+(Number(p.total_hours)||0), 0);

  if (type === 'executive') {
    const critRows = crits.map(p=>`  • ${p.project_name.trim()} (${p.client_name}): ${fmtPct(p.pct_consumed)} del budget`).join('\n');
    const warnRows = warns.map(p=>`  • ${p.project_name.trim()} (${p.client_name}): ${fmtPct(p.pct_consumed)} del budget`).join('\n');
    return `<pre style="white-space:pre-wrap;font-family:var(--mono);font-size:12px;line-height:1.7">
📊 REPORTE EJECUTIVO — Intermedia
Fecha: ${now}
${'─'.repeat(50)}

RESUMEN DEL PORTFOLIO
  Total proyectos activos: ${billable.length}
  Proyectos críticos:      ${crits.length}
  Proyectos en riesgo:     ${warns.length}
  Total horas billeables:  ${fmt(totalHrs)}h

${'─'.repeat(50)}
${crits.length > 0 ? `🔴 PROYECTOS CRÍTICOS (requieren acción inmediata)\n${critRows}\n\n` : ''}${warns.length > 0 ? `⚠️ PROYECTOS EN RIESGO\n${warnRows}\n\n` : ''}${'─'.repeat(50)}

PROYECTOS EN CURSO
${billable.filter(p=>p.status==='ok').map(p=>`  ✓ ${p.project_name.trim().padEnd(35)} ${fmtH(p.total_hours).padStart(8)} ${p.pct_consumed?fmtPct(p.pct_consumed).padStart(8):' Sin budget'}`).join('\n')}
</pre>`;
  }

  if (type === 'client') {
    const clients = [...new Set(STATE.projects.map(p=>p.client_name))].sort();
    const rows = clients.map(cl => {
      const ps = STATE.projects.filter(p=>p.client_name===cl);
      const total = ps.reduce((s,p)=>s+(Number(p.total_hours)||0),0);
      return `\n  ${cl} (${ps.length} proyectos — ${fmt(total)}h total)\n` +
        ps.map(p=>`    • ${p.project_name.trim()}: ${fmtH(p.total_hours)} — ${statusLabel(p.status)}`).join('\n');
    }).join('\n');
    return `<pre style="white-space:pre-wrap;font-family:var(--mono);font-size:12px;line-height:1.7">
📋 REPORTE POR CLIENTE — Intermedia
Fecha: ${now}
${'─'.repeat(50)}
${rows}
</pre>`;
  }

  if (type === 'hours') {
    const pRows = [...STATE.people].sort((a,b)=>b.total_hours-a.total_hours)
      .map(p=>`  ${p.name.padEnd(28)} ${fmt(p.total_hours).padStart(8)}h  Billeable: ${p.billable_hours.toFixed(0)}h (${p.pct_billable.toFixed(0)}%)  Últ: ${fmtDate(p.last_entry)}`).join('\n');
    return `<pre style="white-space:pre-wrap;font-family:var(--mono);font-size:12px;line-height:1.7">
⏱️ REPORTE DE HORAS POR PERSONA — Intermedia
Fecha: ${now}
${'─'.repeat(70)}

${pRows}
</pre>`;
  }

  if (type === 'alerts') {
    const rows = STATE.projects.filter(p=>{const{auto,manual}=allAlerts(p);return auto.length+manual.length>0;})
      .sort((a,b)=>(a.status==='critical'?-1:1))
      .map(p=>{const{auto,manual}=allAlerts(p);return `  ${p.project_name.trim()} (${p.client_name})\n${[...auto,...manual.map(m=>m.text)].map(a=>`    → ${a}`).join('\n')}`}).join('\n\n');
    return `<pre style="white-space:pre-wrap;font-family:var(--mono);font-size:12px;line-height:1.7">
🚨 REPORTE DE ALERTAS — Intermedia
Fecha: ${now}
${'─'.repeat(50)}

${rows || 'Sin alertas activas.'}
</pre>`;
  }

  if (type === 'financial') {
    const bHrs = billable.reduce((s,p)=>s+(Number(p.total_hours)||0),0);
    const nbHrs = STATE.projects.filter(p=>p.billable!=='Sí').reduce((s,p)=>s+(Number(p.total_hours)||0),0);
    const totalAll = bHrs + nbHrs;
    const utilPct = totalAll > 0 ? (bHrs/totalAll*100).toFixed(1) : 0;
    return `<pre style="white-space:pre-wrap;font-family:var(--mono);font-size:12px;line-height:1.7">
💰 REPORTE FINANCIERO — Intermedia
Fecha: ${now}
${'─'.repeat(50)}

DISTRIBUCIÓN DE HORAS
  Total horas registradas:  ${fmt(totalAll)}h
  Horas billeables:         ${fmt(bHrs)}h (${utilPct}%)
  Horas no billeables:      ${fmt(nbHrs)}h (${(100-Number(utilPct)).toFixed(1)}%)
  Utilización del equipo:   ${utilPct}%

PROYECTOS CON MAYOR CONSUMO DE BUDGET
${STATE.projects.filter(p=>p.pct_consumed>0).sort((a,b)=>b.pct_consumed-a.pct_consumed).slice(0,10)
  .map(p=>`  ${p.project_name.trim().substring(0,30).padEnd(30)} ${fmtPct(p.pct_consumed).padStart(8)} del budget`).join('\n')}
</pre>`;
  }

  return '<div style="padding:20px;color:var(--text3)">Seleccioná un tipo de reporte</div>';
}

function copyReport() {
  const txt = document.getElementById('report-content')?.innerText || '';
  navigator.clipboard.writeText(txt).then(() => toast('Reporte copiado al portapapeles', 'success'));
}

function emailReport() {
  const txt = document.getElementById('report-content')?.innerText || '';
  const subject = encodeURIComponent(`Reporte Intermedia — ${new Date().toLocaleDateString('es-AR')}`);
  const body = encodeURIComponent(txt);
  window.open(`mailto:?subject=${subject}&body=${body}`);
}

// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
function renderConfig() {
  document.getElementById('content').innerHTML = `
  <div class="config-card">
    <div class="config-title">Conexión con Apps Script</div>
    <div class="config-grid">
      <div class="field" style="grid-column:1/-1"><label>URL del Apps Script</label>
        <input type="text" id="cfg-api" value="${API}" placeholder="https://script.google.com/macros/s/.../exec">
      </div>
    </div>
    <div style="margin-top:14px;font-family:var(--mono);font-size:11px;color:var(--text3)">
      Para cambiar la URL permanentemente, editá la variable <code>API</code> al inicio del archivo index.html.
    </div>
  </div>

  <div class="config-card">
    <div class="config-title">Notificaciones Slack</div>
    <div class="config-grid">
      <div class="field"><label>Días sin cargar para notificar</label>
        <input type="number" id="cfg-dias" value="${STATE.appConfig.dias_sin_cargar||5}" min="1" max="30">
      </div>
    </div>
    <div style="margin-top:14px;display:flex;gap:10px">
      <button class="btn-primary" onclick="saveAppConfigFull()">Guardar</button>
      <button class="btn-ghost" onclick="sendSlackReminders()">🔔 Enviar recordatorios ahora</button>
    </div>
  </div>

  <div class="config-card">
    <div class="config-title">Datos y Sincronización</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px">
      Los datos se sincronizan automáticamente todos los días a las 7am y los lunes a las 8am.
      Usá el botón Sincronizar del sidebar para una actualización manual inmediata.
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn-primary" onclick="doSync()">⟳ Sincronizar ahora</button>
      <button class="btn-ghost" onclick="if(confirm('¿Resetear configuración manual?')){STATE.projConfig={};STATE.alerts={};save(\'im_proj_config\',{});save(\'im_alerts\',{});toast(\'Reseteado\',\'success\');}">Resetear config manual</button>
      <button class="btn-ghost" onclick="exportConfig()">↓ Exportar configuración</button>
    </div>
  </div>

  <div class="config-card">
    <div class="config-title">Información del Sistema</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">
      <div style="color:var(--text2)">Proyectos cargados: <span style="color:var(--text)">${STATE.projects.length}</span></div>
      <div style="color:var(--text2)">Personas: <span style="color:var(--text)">${STATE.people.length}</span></div>
      <div style="color:var(--text2)">Config manual: <span style="color:var(--text)">${Object.keys(STATE.projConfig).length} proyectos</span></div>
      <div style="color:var(--text2)">Alertas manuales: <span style="color:var(--text)">${Object.values(STATE.alerts).reduce((s,a)=>s+a.length,0)}</span></div>
    </div>
  </div>`;
}

async function saveAppConfigFull() {
  const dias = Number(document.getElementById('cfg-dias').value);
  await updateDiasSinCargar(dias);
  toast('Configuración guardada', 'success');
}

function exportConfig() {
  const data = JSON.stringify({ projConfig: STATE.projConfig, alerts: STATE.alerts, appConfig: STATE.appConfig }, null, 2);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([data], {type:'application/json'}));
  a.download = 'intermedia_config.json';
  a.click();
  toast('Configuración exportada', 'success');
}

// ═══════════════════════════════════════════════════════
// SYNC & SLACK
// ═══════════════════════════════════════════════════════
async function doSync() {
  const btn = document.querySelector('.sync-btn');
  btn?.classList.add('syncing');
  document.getElementById('sync-status').textContent = '○';
  document.getElementById('sync-status').style.color = 'var(--warn)';

  await apiFetch('sync');

  // Reload data after sync
  setTimeout(async () => {
    await loadData();
    btn?.classList.remove('syncing');
    const now = new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('sync-time').textContent = now;
    document.getElementById('sync-status').textContent = '●';
    document.getElementById('sync-status').style.color = 'var(--ok)';
    toast('✓ Datos actualizados', 'success');
  }, 3000);
}

async function sendSlackReminders() {
  const dias = STATE.appConfig.dias_sin_cargar || 5;
  toast('Enviando recordatorios Slack…', 'info');
  const res = await apiGet('sendSlackReminders', { dias });
  if (res.ok) toast(`✓ ${res.sent || 0} recordatorios enviados`, 'success');
  else toast('Error: ' + (res.message || 'Sin respuesta'), 'error');
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastTimer;
function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
loadData();
</script>
