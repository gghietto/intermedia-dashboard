<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intermedia — Project Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0d14;
  --surface: #111520;
  --surface2: #171c2e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --text2: #8b90a8;
  --text3: #4a4f6a;
  --accent: #4f7cff;
  --accent2: #7b5ea7;
  --critical: #ff4545;
  --critical-bg: rgba(255,69,69,0.1);
  --warning: #f59e0b;
  --warning-bg: rgba(245,158,11,0.1);
  --ok: #22c55e;
  --ok-bg: rgba(34,197,94,0.1);
  --internal: #64748b;
  --internal-bg: rgba(100,116,139,0.1);
  --inactive: #374151;
  --r: 10px;
  --r-sm: 6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── LAYOUT ── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.sidebar-logo .wordmark{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px;color:var(--text)}
.sidebar-logo .sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;position:relative}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(79,124,255,0.15),rgba(123,94,167,0.1));color:var(--accent);border:1px solid rgba(79,124,255,0.2)}
.nav-item .icon{width:18px;text-align:center;font-size:15px}
.nav-badge{margin-left:auto;background:var(--critical);color:#fff;font-size:10px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:20px;font-weight:500}
.nav-section{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);padding:14px 12px 6px;text-transform:uppercase;letter-spacing:1px}
.sidebar-bottom{padding:14px 10px;border-top:1px solid var(--border)}
.sync-btn{width:100%;padding:10px 14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r-sm);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;justify-content:center;transition:opacity .15s}
.sync-btn:hover{opacity:.85}
.sync-btn.syncing .sync-icon{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.last-sync{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;text-align:center;margin-top:6px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:var(--surface);flex-shrink:0}
.page-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;flex:1}
.time-filters{display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:var(--r-sm);border:1px solid var(--border)}
.tf{padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-family:'DM Mono',monospace;color:var(--text2);transition:all .15s;white-space:nowrap}
.tf:hover{color:var(--text)}
.tf.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.content{flex:1;overflow-y:auto;padding:24px 28px}

/* ── CARDS / KPIs ── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.total::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.kpi.critical-k::before{background:var(--critical)}
.kpi.warning-k::before{background:var(--warning)}
.kpi.ok-k::before{background:var(--ok)}
.kpi.hours-k::before{background:linear-gradient(90deg,#06b6d4,var(--accent))}
.kpi-label{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.kpi.critical-k .kpi-val{color:var(--critical)}
.kpi.warning-k .kpi-val{color:var(--warning)}
.kpi.ok-k .kpi-val{color:var(--ok)}

/* ── SECTION TITLES ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-title span{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;font-weight:400}

/* ── CHARTS GRID ── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.charts-grid.three{grid-template-columns:1fr 1fr 1fr}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.chart-card.wide{grid-column:1/-1}
.chart-title{font-size:12px;font-family:'DM Mono',monospace;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.chart-wrap{position:relative}

/* ── PROJECTS TABLE ── */
.toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.search{flex:1;max-width:280px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .15s}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--text3)}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--accent)}

.proj-table{width:100%;border-collapse:collapse}
.proj-table th{text-align:left;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:8px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
.proj-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.proj-table tr:hover td{background:rgba(255,255,255,0.02);cursor:pointer}
.proj-table tr:last-child td{border-bottom:none}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-family:'DM Mono',monospace;font-weight:500;white-space:nowrap}
.badge.critical{background:var(--critical-bg);color:var(--critical);border:1px solid rgba(255,69,69,0.2)}
.badge.warning{background:var(--warning-bg);color:var(--warning);border:1px solid rgba(245,158,11,0.2)}
.badge.ok{background:var(--ok-bg);color:var(--ok);border:1px solid rgba(34,197,94,0.2)}
.badge.internal{background:var(--internal-bg);color:var(--internal);border:1px solid rgba(100,116,139,0.2)}
.badge.inactive{background:rgba(55,65,81,0.3);color:#6b7280;border:1px solid rgba(55,65,81,0.3)}

.pbar-wrap{width:120px}
.pbar-bg{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;border-radius:2px;transition:width .3s}
.pbar-fill.critical{background:var(--critical)}
.pbar-fill.warning{background:var(--warning)}
.pbar-fill.ok{background:var(--ok)}
.pbar-fill.none{background:var(--text3)}
.pbar-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);margin-top:3px}

.client-tag{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:3px}

/* ── PROJECT DETAIL MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:flex-start;justify-content:flex-end;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal{width:560px;height:100vh;background:var(--surface);border-left:1px solid var(--border2);overflow-y:auto;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.modal-head{padding:24px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10}
.modal-close{position:absolute;top:20px;right:24px;width:30px;height:30px;border:1px solid var(--border);border-radius:50%;background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.modal-close:hover{border-color:var(--text);color:var(--text)}
.modal-client{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:4px}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;padding-right:40px}
.modal-body{padding:24px 28px}
.modal-section{margin-bottom:28px}
.modal-section-title{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px}
.stat-box-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-box-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.stat-box-val.critical{color:var(--critical)}
.stat-box-val.warning{color:var(--warning)}
.stat-box-val.ok{color:var(--ok)}

/* ── EDIT INPUTS ── */
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.input-group{display:flex;flex-direction:column;gap:6px}
.input-group label{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.input-group input,.input-group select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border .15s;width:100%}
.input-group input:focus,.input-group select:focus{border-color:var(--accent)}
.save-btn{padding:9px 20px;background:var(--accent);border:none;border-radius:var(--r-sm);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
.save-btn:hover{opacity:.85}
.save-btn.saved{background:var(--ok)}

/* ── TASKS TABLE ── */
.tasks-table{width:100%;border-collapse:collapse}
.tasks-table th{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)}
.tasks-table td{padding:8px 10px;font-size:12px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace}
.tasks-table tr:last-child td{border-bottom:none}

/* ── ALERTS SECTION ── */
.alert-list{display:flex;flex-direction:column;gap:8px}
.alert-item{display:flex;align-items:flex-start;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px}
.alert-item.auto{border-left:2px solid var(--critical)}
.alert-item.manual{border-left:2px solid var(--warning)}
.alert-text{flex:1;font-size:13px;line-height:1.4}
.alert-meta{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);margin-top:3px}
.alert-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:3px;transition:color .15s;flex-shrink:0}
.alert-del:hover{color:var(--critical)}
.alert-add{display:flex;gap:8px;margin-top:10px}
.alert-add input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.alert-add input:focus{border-color:var(--warning)}
.alert-add button{padding:8px 14px;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);border-radius:var(--r-sm);color:var(--warning);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s}
.alert-add button:hover{background:rgba(245,158,11,0.25)}
.auto-alert-tag{font-size:10px;font-family:'DM Mono',monospace;background:var(--critical-bg);color:var(--critical);padding:2px 6px;border-radius:3px;flex-shrink:0;margin-top:1px}
.manual-tag{font-size:10px;font-family:'DM Mono',monospace;background:var(--warning-bg);color:var(--warning);padding:2px 6px;border-radius:3px;flex-shrink:0;margin-top:1px}

/* ── ALERTS PAGE ── */
.alerts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.alert-project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:border .15s}
.alert-project-card:hover{border-color:var(--border2)}
.alert-project-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;margin-bottom:4px}
.alert-project-client{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:12px}

/* ── PEOPLE ── */
.people-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.person-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.person-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:12px}
.person-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:2px}
.person-email{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:14px}
.person-stat{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.person-stat:last-child{border-bottom:none}
.person-stat-label{color:var(--text2)}
.person-stat-val{font-family:'DM Mono',monospace;font-weight:500}

/* ── CONFIG ── */
.config-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px}
.config-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:20px}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.config-save{margin-top:16px;padding:10px 20px;background:var(--accent);border:none;border-radius:var(--r-sm);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:12px 18px;font-size:13px;z-index:9999;transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-left:3px solid var(--ok)}
.toast.error{border-left:3px solid var(--critical)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-text{font-size:14px}

/* ── PAGINATION ── */
.pagination{display:flex;justify-content:space-between;align-items:center;padding:14px 0;margin-top:8px}
.pag-info{font-size:12px;font-family:'DM Mono',monospace;color:var(--text3)}
.pag-btns{display:flex;gap:4px}
.pag-btn{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s}
.pag-btn:hover{border-color:var(--border2);color:var(--text)}
.pag-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pag-btn:disabled{opacity:.3;cursor:not-allowed}

/* ── RESPONSIVE ── */
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.people-grid{grid-template-columns:1fr 1fr}}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}.alerts-grid{grid-template-columns:1fr}.sidebar{width:60px}.sidebar-logo .wordmark,.sidebar-logo .sub,.nav-item span,.nav-section,.sync-btn span,.last-sync{display:none}.nav-item{justify-content:center}.sync-btn{padding:10px}}
</style>
</head>
<body>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="wordmark">intermedia</div>
      <div class="sub">PROJECT OPS</div>
    </div>
    <nav class="nav">
      <div class="nav-section">Overview</div>
      <div class="nav-item active" onclick="showPage('dashboard')">
        <span class="icon">◈</span><span>Dashboard</span>
      </div>
      <div class="nav-section">Projects</div>
      <div class="nav-item" onclick="showPage('projects')">
        <span class="icon">⬡</span><span>Proyectos</span>
      </div>
      <div class="nav-item" id="nav-alerts" onclick="showPage('alerts')">
        <span class="icon">◉</span><span>Alertas</span>
        <span class="nav-badge" id="alert-count">0</span>
      </div>
      <div class="nav-section">Team</div>
      <div class="nav-item" onclick="showPage('people')">
        <span class="icon">◎</span><span>Personas</span>
      </div>
      <div class="nav-section">System</div>
      <div class="nav-item" onclick="showPage('config')">
        <span class="icon">⊕</span><span>Configuración</span>
      </div>
    </nav>
    <div class="sidebar-bottom">
      <button class="sync-btn" onclick="syncTick()">
        <span class="sync-icon">⟳</span><span>Sincronizar</span>
      </button>
      <div class="last-sync" id="last-sync">Última: hace 2h</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">Dashboard</div>
      <div class="time-filters" id="time-filters">
        <div class="tf" onclick="setFilter('day')">Hoy</div>
        <div class="tf" onclick="setFilter('week')">Semana</div>
        <div class="tf active" onclick="setFilter('month')">Mes</div>
        <div class="tf" onclick="setFilter('quarter')">Quarter</div>
        <div class="tf" onclick="setFilter('half')">6 Meses</div>
        <div class="tf" onclick="setFilter('year')">Año</div>
        <div class="tf" onclick="setFilter('all')">Histórico</div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- PROJECT DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-client" id="modal-client"></div>
      <div class="modal-title" id="modal-title"></div>
      <div id="modal-badge"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════

// ── HELPERS ────────────────────────────────────────────
function getProject(id){ return PROJECTS_DATA.find(p => p.id === id) }
function getCfg(id){ return projectConfig[id] || {} }
function getAlerts(id){ return manualAlerts[id] || [] }

function effectivePct(p){
  const cfg = getCfg(p.id);
  const budget = cfg.budget != null ? cfg.budget : p.budget;
  if(!budget) return null;
  return Math.round((p.hours / budget) * 100 * 10) / 10;
}

function effectiveStatus(p){
  const pct = effectivePct(p);
  if(p.status === 'internal') return 'internal';
  if(p.status === 'inactive') return 'inactive';
  if(pct && pct > 100) return 'critical';
  if(pct && pct >= 85) return 'warning';
  if(p.hours > 0) return 'ok';
  return 'inactive';
}

function statusLabel(s){ return {critical:'⛔ Crítico',warning:'⚠️ En riesgo',ok:'● En curso',internal:'○ Interno',inactive:'— Inactivo'}[s] || s }
function fmt(n){ if(n==null) return '—'; return Number(n).toLocaleString('es-AR',{maximumFractionDigits:1}) }
function fmtDate(d){ if(!d) return '—'; try{ const dt=new Date(d+'T12:00:00'); return dt.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}) }catch(e){return d} }
function daysLeft(d){ if(!d) return null; const diff=(new Date(d+'T12:00:00')-new Date())/(1000*60*60*24); return Math.round(diff) }

function autoAlertsFor(p){
  const alerts = [];
  const pct = effectivePct(p);
  const cfg = getCfg(p.id);
  const endDate = cfg.endDate || p.endDate;
  if(pct && pct > 100) alerts.push(`⛔ Pasado de budget (${pct}%)`);
  else if(pct && pct >= 85) alerts.push(`⚠️ Cerca del budget (${pct}%)`);
  if(endDate){ const d=daysLeft(endDate); if(d<0) alerts.push('📅 Pasado fecha fin'); else if(d<=30) alerts.push(`📅 Vence en ${d} días`); }
  return alerts;
}

function totalAutoAlerts(){ return PROJECTS_DATA.reduce((s,p) => s + autoAlertsFor(p).length, 0) }
function totalManualAlerts(){ return Object.values(manualAlerts).reduce((s,a) => s + a.length, 0) }

// ── NAVIGATION ─────────────────────────────────────────
function showPage(name){
  currentPage = name;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const titles = {dashboard:'Dashboard',projects:'Proyectos',alerts:'Alertas',people:'Personas',config:'Configuración'};
  document.getElementById('page-title').textContent = titles[name] || name;
  
  // Activate nav item
  const navMap = {dashboard:0,projects:1,alerts:2,people:3,config:4};
  document.querySelectorAll('.nav-item')[navMap[name]]?.classList.add('active');

  updateAlertBadge();
  renderPage();
}

function updateAlertBadge(){
  const total = totalAutoAlerts() + totalManualAlerts();
  document.getElementById('alert-count').textContent = total;
}

function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.tf').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  renderPage();
}

// ── RENDER ─────────────────────────────────────────────
function renderPage(){
  const el = document.getElementById('content');
  if(currentPage === 'dashboard') el.innerHTML = renderDashboard();
  else if(currentPage === 'projects') el.innerHTML = renderProjects();
  else if(currentPage === 'alerts') el.innerHTML = renderAlertsPage();
  else if(currentPage === 'people') el.innerHTML = renderPeople();
  else if(currentPage === 'config') el.innerHTML = renderConfig();

  if(currentPage === 'dashboard') initCharts();
}

  newChart('chart-billeable','doughnut',['Billeable','No Billeable'],[Math.round(bHrs),Math.round(nbHrs)],['#4f7cff','#374151']);

  // Clients
  const clientMap = {};
  PROJECTS_DATA.forEach(p => { if(!clientMap[p.client]) clientMap[p.client]=0; clientMap[p.client]+=p.hours });
  const cSorted = Object.entries(clientMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  newBarH('chart-clients', cSorted.map(c=>c[0]), cSorted.map(c=>Math.round(c[1])), '#4f7cff');

  // All projects
  const allSorted = [...PROJECTS_DATA].sort((a,b)=>b.hours-a.hours);
  const colors = allSorted.map(p => ({critical:'#ff4545',warning:'#f59e0b',ok:'#4f7cff',internal:'#374151',inactive:'#1f2937'}[effectiveStatus(p)]));
  newBarH('chart-all-proj', allSorted.map(p=>p.name.substring(0,30)), allSorted.map(p=>p.hours), colors);

  // Budget vs hours
  const withBudget = PROJECTS_DATA.filter(p=>p.budget).sort((a,b)=>b.hours-a.hours);
  const ctx5 = document.getElementById('chart-budget')?.getContext('2d');
  if(ctx5){
    new Chart(ctx5, {
      type:'bar',
      data:{
        labels: withBudget.map(p=>p.name.substring(0,28)),
        datasets:[
          {label:'Budget',data:withBudget.map(p=>p.budget),backgroundColor:'rgba(79,124,255,0.25)',borderColor:'#4f7cff',borderWidth:1},
          {label:'Horas',data:withBudget.map(p=>p.hours),backgroundColor:withBudget.map(p=>effectiveStatus(p)==='critical'?'rgba(255,69,69,0.7)':'rgba(79,124,255,0.7)'),borderWidth:0}
        ]
      },
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b90a8',font:{family:'DM Mono',size:11}}}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#8b90a8',font:{family:'DM Mono',size:10}}},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#8b90a8',font:{family:'DM Mono',size:10}}}}}
    });
  }

  // % consumido
  const pctColors = withBudget.map(p=>{ const pct=effectivePct(p)||0; return pct>100?'rgba(255,69,69,0.7)':pct>=85?'rgba(245,158,11,0.7)':'rgba(34,197,94,0.7)' });
  const ctx6 = document.getElementById('chart-pct')?.getContext('2d');
  if(ctx6){
    new Chart(ctx6,{
      type:'bar',
      data:{labels:withBudget.map(p=>p.name.substring(0,28)),datasets:[{label:'% Consumido',data:withBudget.map(p=>effectivePct(p)||0),backgroundColor:pctColors,borderWidth:0}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#8b90a8',font:{family:'DM Mono',size:10}},max:Math.max(...withBudget.map(p=>effectivePct(p)||0))*1.1},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#8b90a8',font:{family:'DM Mono',size:10}}}}}
    });
  }
}

function newChart(id, type, labels, data, colors){
  const ctx = document.getElementById(id)?.getContext('2d');
  if(!ctx) return;
  new Chart(ctx,{
    type,
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:type==='doughnut'?'60%':undefined,plugins:{legend:{position:'right',labels:{color:'#8b90a8',font:{family:'DM Mono',size:11},boxWidth:12,padding:12}}}}
  });
}

function newBarH(id, labels, data, colors){
  const ctx = document.getElementById(id)?.getContext('2d');
  if(!ctx) return;
  const colorsArr = Array.isArray(colors) ? colors : Array(labels.length).fill(colors);
  new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:colorsArr,borderWidth:0}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#8b90a8',font:{family:'DM Mono',size:10}}},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#8b90a8',font:{family:'DM Mono',size:10}}}}}
  });
}

// ── PROJECTS ───────────────────────────────────────────
function renderProjects(){
  const filtered = PROJECTS_DATA.filter(p => {
    const s = effectiveStatus(p);
    if(filterStatus !== 'all' && s !== filterStatus) return false;
    if(filterBillable === 'billable' && !p.billable) return false;
    if(filterBillable === 'nonbillable' && p.billable) return false;
    if(searchTerm && !p.name.toLowerCase().includes(searchTerm.toLowerCase()) && !p.client.toLowerCase().includes(searchTerm.toLowerCase())) return false;
    return true;
  });

  const total = filtered.length;
  const pages = Math.ceil(total / PROJ_PER_PAGE);
  if(projPage > pages) projPage = 1;
  const start = (projPage-1)*PROJ_PER_PAGE;
  const paged = filtered.slice(start, start+PROJ_PER_PAGE);

  const rows = paged.map(p => {
    const s = effectiveStatus(p);
    const pct = effectivePct(p);
    const cfg = getCfg(p.id);
    const budget = cfg.budget != null ? cfg.budget : p.budget;
    const alertCount = autoAlertsFor(p).length + getAlerts(p.id).length;
    return `
    <tr onclick="openModal(${p.id})">
      <td><span class="client-tag">${p.client}</span></td>
      <td style="font-weight:500;max-width:220px">${p.name}</td>
      <td><span class="badge ${s}">${statusLabel(s)}</span></td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${budget ? fmt(budget)+'h' : '—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${fmt(p.hours)}h</td>
      <td>
        ${pct != null ? `
        <div class="pbar-wrap">
          <div class="pbar-bg"><div class="pbar-fill ${s}" style="width:${Math.min(pct,100)}%"></div></div>
          <div class="pbar-label">${pct}%</div>
        </div>` : '<span style="color:var(--text3);font-size:11px;font-family:\'DM Mono\'">Sin budget</span>'}
      </td>
      <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text2)">${p.pm || '—'}</td>
      <td>${alertCount > 0 ? `<span style="background:var(--critical-bg);color:var(--critical);font-size:11px;font-family:'DM Mono';padding:2px 7px;border-radius:20px">${alertCount} alerta${alertCount>1?'s':''}</span>` : '<span style="color:var(--text3);font-size:11px">—</span>'}</td>
    </tr>`;
  }).join('');

  const paginationBtns = Array.from({length:pages},(_,i)=>`<button class="pag-btn ${i+1===projPage?'active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join('');

  return `
  <div class="toolbar">
    <input class="search" placeholder="Buscar proyecto o cliente…" value="${searchTerm}" oninput="searchTerm=this.value;projPage=1;renderPage()">
    <select class="filter-select" onchange="filterStatus=this.value;projPage=1;renderPage()">
      <option value="all" ${filterStatus==='all'?'selected':''}>Todos los estados</option>
      <option value="critical" ${filterStatus==='critical'?'selected':''}>⛔ Críticos</option>
      <option value="warning" ${filterStatus==='warning'?'selected':''}>⚠️ En riesgo</option>
      <option value="ok" ${filterStatus==='ok'?'selected':''}>● En curso</option>
      <option value="internal" ${filterStatus==='internal'?'selected':''}>○ Internos</option>
    </select>
    <select class="filter-select" onchange="filterBillable=this.value;projPage=1;renderPage()">
      <option value="all" ${filterBillable==='all'?'selected':''}>Todos</option>
      <option value="billable" ${filterBillable==='billable'?'selected':''}>Billeables</option>
      <option value="nonbillable" ${filterBillable==='nonbillable'?'selected':''}>No billeables</option>
    </select>
    <span style="font-size:12px;font-family:'DM Mono';color:var(--text3);margin-left:auto">${total} proyectos</span>
  </div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
    <table class="proj-table">
      <thead><tr>
        <th>Cliente</th><th>Proyecto</th><th>Estado</th><th>Budget</th>
        <th>Horas</th><th>% Consumido</th><th>PM</th><th>Alertas</th>
      </tr></thead>
      <tbody>${rows || '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3)">Sin resultados</td></tr>'}</tbody>
    </table>
  </div>
  <div class="pagination">
    <span class="pag-info">Mostrando ${start+1}–${Math.min(start+PROJ_PER_PAGE,total)} de ${total}</span>
    <div class="pag-btns">
      <button class="pag-btn" onclick="goPage(projPage-1)" ${projPage===1?'disabled':''}>‹</button>
      ${paginationBtns}
      <button class="pag-btn" onclick="goPage(projPage+1)" ${projPage===pages?'disabled':''}>›</button>
    </div>
  </div>`;
}

function goPage(n){ projPage=n; renderPage(); document.getElementById('content').scrollTop=0; }

// ── MODAL ──────────────────────────────────────────────
function openModal(id){
  const p = getProject(id);
  if(!p) return;
  const cfg = getCfg(id);
  const s = effectiveStatus(p);
  const pct = effectivePct(p);
  const budget = cfg.budget != null ? cfg.budget : p.budget;
  const startDate = cfg.startDate || p.startDate;
  const endDate = cfg.endDate || p.endDate;
  const pm = cfg.pm != null ? cfg.pm : p.pm;
  const autoA = autoAlertsFor(p);
  const manualA = getAlerts(id);

  document.getElementById('modal-client').textContent = p.client;
  document.getElementById('modal-title').textContent = p.name;
  document.getElementById('modal-badge').innerHTML = `<span class="badge ${s}">${statusLabel(s)}</span>`;

  document.getElementById('modal-body').innerHTML = `
  <!-- Stats -->
  <div class="modal-section">
    <div class="modal-section-title">Resumen</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-box-label">Budget</div>
        <div class="stat-box-val">${budget ? fmt(budget)+'h' : '—'}</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-label">Horas cargadas</div>
        <div class="stat-box-val ${s}">${fmt(p.hours)}h</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-label">Horas restantes</div>
        <div class="stat-box-val ${pct&&pct>100?'critical':''}">${budget ? fmt(budget-p.hours)+'h' : '—'}</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-label">% Consumido</div>
        <div class="stat-box-val ${s}">${pct != null ? pct+'%' : '—'}</div>
      </div>
    </div>
    ${pct != null ? `
    <div style="margin-top:14px">
      <div style="display:flex;justify-content:space-between;font-size:11px;font-family:'DM Mono';color:var(--text3);margin-bottom:6px"><span>Progreso del budget</span><span>${pct}%</span></div>
      <div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${Math.min(pct,100)}%;background:${pct>100?'var(--critical)':pct>=85?'var(--warning)':'var(--ok)'};border-radius:3px;transition:width .5s"></div>
      </div>
    </div>` : ''}
  </div>

  <!-- Fechas y config -->
  <div class="modal-section">
    <div class="modal-section-title">Configuración del Proyecto</div>
    <div class="edit-grid">
      <div class="input-group">
        <label>Budget (horas)</label>
        <input type="number" id="cfg-budget" value="${budget || ''}" placeholder="Sin definir">
      </div>
      <div class="input-group">
        <label>PM / Gestor</label>
        <input type="text" id="cfg-pm" value="${pm || ''}" placeholder="Nombre del PM">
      </div>
      <div class="input-group">
        <label>Fecha inicio</label>
        <input type="date" id="cfg-start" value="${startDate || ''}">
      </div>
      <div class="input-group">
        <label>Fecha fin estimada</label>
        <input type="date" id="cfg-end" value="${endDate || ''}">
      </div>
    </div>
    <div style="margin-top:14px">
      <button class="save-btn" id="save-cfg-btn" onclick="saveProjectConfig(${id})">Guardar cambios</button>
    </div>
  </div>

  <!-- Roles/Tecnología -->
  ${p.tasks && p.tasks.length > 0 ? `
  <div class="modal-section">
    <div class="modal-section-title">Detalle por Rol / Tecnología</div>
    <table class="tasks-table">
      <thead><tr><th>Rol</th><th>Budget</th><th>Horas</th><th>%</th></tr></thead>
      <tbody>
        ${p.tasks.filter(t=>t.hours>0||t.budget>0).map(t => {
          const tPct = t.budget ? Math.round(t.hours/t.budget*100) : null;
          const tColor = tPct && tPct > 100 ? 'var(--critical)' : tPct && tPct >= 85 ? 'var(--warning)' : 'var(--text)';
          return `<tr>
            <td style="color:var(--text)">${t.name}</td>
            <td>${t.budget ? fmt(t.budget)+'h' : '—'}</td>
            <td>${fmt(t.hours)}h</td>
            <td style="color:${tColor}">${tPct != null ? tPct+'%' : '—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>` : ''}

  <!-- Alertas -->
  <div class="modal-section">
    <div class="modal-section-title">Alertas</div>
    <div class="alert-list" id="alert-list-${id}">
      ${autoA.map(a => `
      <div class="alert-item auto">
        <div style="flex:1">
          <div class="alert-text">${a}</div>
          <div class="alert-meta">Automática — generada por el sistema</div>
        </div>
        <span class="auto-alert-tag">AUTO</span>
      </div>`).join('')}
      ${manualA.map(a => `
      <div class="alert-item manual" id="alert-${a.id}">
        <div style="flex:1">
          <div class="alert-text">${a.text}</div>
          <div class="alert-meta">Manual · ${a.date}</div>
        </div>
        <span class="manual-tag">MANUAL</span>
        <button class="alert-del" onclick="deleteAlert(${id},'${a.id}')" title="Eliminar">✕</button>
      </div>`).join('')}
      ${autoA.length === 0 && manualA.length === 0 ? '<div style="color:var(--text3);font-size:13px;padding:12px 0">Sin alertas activas</div>' : ''}
    </div>
    <div class="alert-add">
      <input type="text" id="new-alert-${id}" placeholder="Ej: Recurso pronto a liberarse…" onkeydown="if(event.key==='Enter')addAlert(${id})">
      <button onclick="addAlert(${id})">+ Agregar</button>
    </div>
  </div>`;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e){
  if(e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function saveProjectConfig(id){
  const budget = document.getElementById('cfg-budget').value;
  const pm     = document.getElementById('cfg-pm').value;
  const start  = document.getElementById('cfg-start').value;
  const end    = document.getElementById('cfg-end').value;
  if(!projectConfig[id]) projectConfig[id] = {};
  if(budget !== '') projectConfig[id].budget = parseFloat(budget);
  else delete projectConfig[id].budget;
  projectConfig[id].pm = pm;
  projectConfig[id].startDate = start;
  projectConfig[id].endDate = end;
  saveConfig();
  const btn = document.getElementById('save-cfg-btn');
  btn.textContent = '✓ Guardado'; btn.classList.add('saved');
  setTimeout(()=>{ btn.textContent='Guardar cambios'; btn.classList.remove('saved'); },2000);
  showToast('Configuración guardada','success');
  updateAlertBadge();
}

function addAlert(id){
  const input = document.getElementById(`new-alert-${id}`);
  const text = input.value.trim();
  if(!text) return;
  if(!manualAlerts[id]) manualAlerts[id] = [];
  const alertId = Date.now().toString();
  const today = new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
  manualAlerts[id].push({id: alertId, text, date: today});
  saveAlerts();
  input.value = '';
  // Refresh alert list
  const list = document.getElementById(`alert-list-${id}`);
  if(list){
    const newItem = document.createElement('div');
    newItem.className = 'alert-item manual';
    newItem.id = `alert-${alertId}`;
    newItem.innerHTML = `
      <div style="flex:1">
        <div class="alert-text">${text}</div>
        <div class="alert-meta">Manual · ${today}</div>
      </div>
      <span class="manual-tag">MANUAL</span>
      <button class="alert-del" onclick="deleteAlert(${id},'${alertId}')" title="Eliminar">✕</button>`;
    list.appendChild(newItem);
    // Remove empty state if present
    const empty = list.querySelector('[style*="Sin alertas"]');
    if(empty) empty.remove();
  }
  updateAlertBadge();
  showToast('Alerta agregada','success');
}

function deleteAlert(projId, alertId){
  if(!manualAlerts[projId]) return;
  manualAlerts[projId] = manualAlerts[projId].filter(a => a.id !== alertId);
  saveAlerts();
  const el = document.getElementById(`alert-${alertId}`);
  if(el){ el.style.opacity='0'; el.style.transform='translateX(20px)'; el.style.transition='all .2s'; setTimeout(()=>el.remove(), 200); }
  updateAlertBadge();
  showToast('Alerta eliminada','success');
}

function addAlertPage(id){
  const input = document.getElementById(`page-alert-${id}`);
  const text = input.value.trim();
  if(!text) return;
  if(!manualAlerts[id]) manualAlerts[id] = [];
  const alertId = Date.now().toString();

    list.appendChild(el);
  }
  updateAlertBadge();
  showToast('Alerta agregada','success');

function deleteAlertPage(projId, alertId){
  deleteAlert(projId, alertId);
  const el = document.getElementById(`palert-${alertId}`);
  if(el){ el.style.opacity='0'; el.style.transition='opacity .2s'; setTimeout(()=>el.remove(),200); }
}

// ── PEOPLE ─────────────────────────────────────────────
function renderPeople(){
  // Simulate team from PM data
  const pms = {};
  PROJECTS_DATA.forEach(p => {
    const pm = getCfg(p.id).pm || p.pm;
    if(!pm) return;
    if(!pms[pm]) pms[pm] = {name:pm, projects:[], totalHours:0, billHours:0};
    pms[pm].projects.push(p);
    pms[pm].totalHours += p.hours;
    if(p.billable) pms[pm].billHours += p.hours;
  });

  const cards = Object.values(pms).sort((a,b)=>b.totalHours-a.totalHours).map(pm => {
    const initials = pm.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
    return `
    <div class="person-card">
      <div class="person-avatar">${initials}</div>
      <div class="person-name">${pm.name}</div>
      <div class="person-email">PM / Gestión</div>
      <div class="person-stat"><span class="person-stat-label">Proyectos asignados</span><span class="person-stat-val">${pm.projects.length}</span></div>
      <div class="person-stat"><span class="person-stat-label">Total horas</span><span class="person-stat-val">${fmt(pm.totalHours)}h</span></div>
      <div class="person-stat"><span class="person-stat-label">Horas billeables</span><span class="person-stat-val" style="color:var(--ok)">${fmt(pm.billHours)}h</span></div>
      <div class="person-stat"><span class="person-stat-label">% billeable</span><span class="person-stat-val">${pm.totalHours>0?Math.round(pm.billHours/pm.totalHours*100):0}%</span></div>
    </div>`;
  }).join('');

  return `
  <div class="section-head"><div class="section-title">Team <span>Datos de PM por proyecto</span></div></div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:20px;font-size:13px;color:var(--text2)">
    ℹ️ La vista detallada por persona (horas diarias por proyecto) estará disponible al conectar el endpoint completo de Tick vía el Apps Script.
  </div>
  <div class="people-grid">${cards || '<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Sin datos de personas disponibles</div></div>'}</div>`;
}

// ── CONFIG ─────────────────────────────────────────────
function renderConfig(){
  return `
  <div class="config-section">
    <div class="config-title">Conexión con Tick</div>
    <div class="config-grid">
      <div class="input-group"><label>Subscription ID</label><input type="text" id="cfg-tick-sub" value="126117" placeholder="ID de suscripción"></div>
      <div class="input-group"><label>API Token</label><input type="password" id="cfg-tick-token" value="97ce0ddfc8b3e879626ebe4f9f774360" placeholder="Token de API"></div>
      <div class="input-group"><label>User Agent</label><input type="text" id="cfg-tick-ua" value="Intermedia (mcassola@intermediait.com)" placeholder="user@empresa.com"></div>
      <div class="input-group"><label>Google Sheet ID (base de datos)</label><input type="text" id="cfg-sheet-id" value="" placeholder="ID del Google Sheet"></div>
    </div>
    <button class="config-save" onclick="showToast('Configuración guardada','success')">Guardar</button>
  </div>

  <div class="config-section">
    <div class="config-title">Proyectos — Configuración Manual</div>
    <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Editá los datos de cada proyecto haciendo click en la tabla de Proyectos o directamente en el detalle del proyecto.</p>
    <div style="display:flex;gap:12px">
      <button class="config-save" onclick="exportConfig()">Exportar configuración</button>
      <button style="padding:10px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer" onclick="resetConfig()">Resetear configuración manual</button>
    </div>
  </div>

  <div class="config-section">
    <div class="config-title">Apps Script — Sincronización automática</div>
    <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Para conectar esta página con Google Sheets y sincronizar datos automáticamente desde Tick, instalá el Apps Script en tu Google Sheets.</p>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px;font-family:'DM Mono';font-size:12px;color:var(--text2)">
      1. Abrí tu Google Sheets → Extensiones → Apps Script<br>
      2. Pegá el código del archivo <strong>Script_Reporte_v3.gs</strong><br>
      3. Completá REPORTE_GENERAL_ID con el ID de tu Sheet<br>
      4. Guardá y recargá → aparece el menú "🚀 Automatización"<br>
      5. Ejecutá "⚡ Actualizar TODO y generar Reporte"
    </div>
  </div>`;
}

function exportConfig(){
  const data = JSON.stringify({projectConfig, manualAlerts}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='intermedia_config.json'; a.click();
  showToast('Configuración exportada','success');
}

function resetConfig(){
  if(!confirm('¿Resetear toda la configuración manual? Esto borrará budgets, fechas y alertas editados.')) return;
  projectConfig = {}; manualAlerts = {};
  saveConfig(); saveAlerts();
  showToast('Configuración reseteada','success');
  renderPage();
}

// ── SYNC ───────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/intermediait.com/s/AKfycbwihY4nGSLfMPZhftXntXatoiMbcVfKoxoNDQJyQEAV1mOnmHL2pNG0pUhNI9whWSLWeA/exec';

function syncTick(){
  const btn = document.querySelector('.sync-btn');
  btn.classList.add('syncing');
  btn.querySelector('span:last-child').textContent = 'Sincronizando…';
  
  fetch(APPS_SCRIPT_URL + '?action=sync')
    .then(r => r.json())
    .then(data => {
      btn.classList.remove('syncing');
      btn.querySelector('span:last-child').textContent = 'Sincronizar';
      document.getElementById('last-sync').textContent = 'Última: ahora';
      showToast('✓ Datos actualizados desde Tick', 'success');
    })
    .catch(() => {
      btn.classList.remove('syncing');
      btn.querySelector('span:last-child').textContent = 'Sincronizar';
      showToast('Error al sincronizar', 'error');
    });
}

// ── TOAST ──────────────────────────────────────────────
function showToast(msg, type='success'){
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  setTimeout(()=>el.classList.remove('show'), 3000);
}

// ── INIT ───────────────────────────────────────────────
updateAlertBadge();
renderPage();

// Close modal on Escape
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
